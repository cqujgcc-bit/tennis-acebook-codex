name: 🚀 Auto Deploy to Aliyun

on:
  push:
    branches:
      - main
    paths:
      - 'v*/server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Server to Aliyun
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 15

      - name: 🔍 查找最新版本目录
        id: find_version
        run: |
          LATEST_VERSION=$(ls -d v* 2>/dev/null | sort -V | tail -n 1)
          echo "version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ 最新版本: $LATEST_VERSION"

      - name: 🔐 测试 SSH 连接
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 120.78.0.96
          username: root
          password: ${{ secrets.ALIYUN_PASSWORD }}
          port: 22
          script: |
            echo "✅ SSH 连接成功"
            echo "主机名: $(hostname)"
            ls -la /var/www/tennispro-new/package.json 2>/dev/null && echo "✅ 目标目录存在" || echo "⚠️ 目标目录为空或不存在"

      - name: 📦 同步 server 代码到阿里云
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 120.78.0.96
          username: root
          password: ${{ secrets.ALIYUN_PASSWORD }}
          port: 22
          source: "${{ steps.find_version.outputs.version }}/server/*"
          target: "/var/www/tennispro-new"
          strip_components: 2
          rm: false

      - name: 🔄 安装依赖 + 编译 + 重启
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 120.78.0.96
          username: root
          password: ${{ secrets.ALIYUN_PASSWORD }}
          port: 22
          script: |
            set -e
            cd /var/www/tennispro-new
            echo "📦 安装依赖..."
            pnpm install
            echo "🔨 编译项目..."
            npm run build
            echo "🚀 重启 PM2..."
            pm2 restart tennispro-new
            echo ""
            echo "✅ 部署完成！"
            pm2 show tennispro-new --no-color | grep -E 'status|restarts|uptime'
