name: 🚀 Auto Deploy to Aliyun + WeChat

on:
  push:
    branches:
      - main

jobs:
  # ===== Job 1: 部署后端到阿里云 =====
  deploy-server:
    runs-on: ubuntu-latest
    name: Deploy Server to Aliyun
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 15

      - name: 🔍 查找最新版本目录
        id: find_version
        run: |
          LATEST_VERSION=$(ls -d v* 2>/dev/null | sort -V | tail -n 1)
          echo "version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"

      - name: 🔐 测试 SSH 连接
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 120.78.0.96
          username: root
          password: ${{ secrets.ALIYUN_PASSWORD }}
          port: 22
          script: |
            echo "✅ SSH 连接成功"

      - name: 📦 同步 server 代码到阿里云
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 120.78.0.96
          username: root
          password: ${{ secrets.ALIYUN_PASSWORD }}
          port: 22
          source: "${{ steps.find_version.outputs.version }}/server/*"
          target: "/var/www/tennispro-new"
          strip_components: 2
          rm: false

      - name: 🔄 安装依赖 + 编译 + 重启
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 120.78.0.96
          username: root
          password: ${{ secrets.ALIYUN_PASSWORD }}
          port: 22
          script: |
            set -e
            cd /var/www/tennispro-new
            pnpm install
            npm run build
            pm2 restart tennispro-new
            echo "✅ 部署完成"

  # ===== Job 2: 上传小程序到微信 =====
  upload-miniapp:
    runs-on: ubuntu-latest
    name: Upload Miniapp to WeChat
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 15

      - name: 🔍 查找最新版本目录
        id: find_version
        run: |
          LATEST_VERSION=$(ls -d v* 2>/dev/null | sort -V | tail -n 1)
          echo "version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"

      - name: 🔑 写入微信私钥
        run: |
          echo "${{ secrets.WX_PRIVATE_KEY }}" > /tmp/private.wx517c76b146302fe5.key
          chmod 600 /tmp/private.wx517c76b146302fe5.key

      - name: 📦 安装 miniprogram-ci
        run: |
          mkdir -p /tmp/wx-upload
          cd /tmp/wx-upload
          npm init -y
          npm install miniprogram-ci

      - name: 🚀 上传小程序体验版
        run: |
          cd /tmp/wx-upload
          node -e "
            const ci = require('miniprogram-ci');
            const version = process.env.VERSION.replace(/^v/, '');
            const project = new ci.Project({
              appid: 'wx517c76b146302fe5',
              type: 'miniProgram',
              projectPath: process.env.PROJECT_PATH,
              privateKeyPath: '/tmp/private.wx517c76b146302fe5.key',
              ignores: ['node_modules/**/*', 'package.json', 'package-lock.json', '*.md', 'upload_miniapp.js'],
            });
            console.log('📤 上传小程序... 版本: ' + version);
            ci.upload({
              project,
              version,
              desc: '自动部署 v' + version,
              setting: { es6: true, es7: true, minify: true, autoPrefixWXSS: true },
            }).then(r => {
              console.log('✅ 小程序上传成功!');
            }).catch(e => {
              console.error('❌ 上传失败:', e.message);
              process.exit(1);
            });
          "
        env:
          VERSION: ${{ steps.find_version.outputs.version }}
          PROJECT_PATH: ${{ github.workspace }}/${{ steps.find_version.outputs.version }}/miniapp
